name: Fetch TCMB Currency Rates

on:
  schedule:
    # Turkey is UTC+3 all year. These run after TCMB's 15:30 publication window.
    - cron: '40 12 * * 1-5'
    - cron: '15 13 * * 1-5'
    - cron: '00 14 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-tcmb-rates:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch TCMB rates and save to Supabase
        env:
          SUPABASE_URL: https://ekpehcfhhldtxsuqiczj.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TCMB_TIMEOUT_MS: '18000'
          TCMB_MAX_ARCHIVE_DAYS: '12'
        run: node scripts/fetch-tcmb-rates.mjs
